version: '3.3'

services:
  db:
    container_name: astronomy-db
    image: mariadb:10.6
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: astronomy_db
      MARIADB_USER: astronomy
      MARIADB_PASSWORD: astronomy
    ports:
      - "3310:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - astronomy-network

  api:
    container_name: astronomy-api
    build: .
    restart: always
    depends_on:
      - db
    environment:
      FLASK_CONFIG: development
      FLASK_DEBUG: 1
      FLASK_ENV: development
      DATABASE_URL: mysql+pymysql://astronomy:astronomy@astronomy-db:3306/astronomy_db
      SECRET_KEY: astronomy-api-secret-key-change-in-production
      PYTHONUNBUFFERED: 1
    ports:
      - "5000:5000"
    volumes:
      - charts-data:/app/static/charts
    command: >
      bash -c "
        echo '=== Astronomy API Startup ===' &&
        mkdir -p /app/static/charts &&
        sleep 10 &&
        echo 'Creating database tables...' &&
        python create_tables.py &&
        echo 'Adding comet type...' &&
        python add_comet_type.py &&
        echo 'Adding variable star type...' &&
        python add_variable_star_type.py &&
        echo 'Creating complete template files...' &&
        python create_complete_templates.py &&
        echo 'Creating server.py...' &&
        python create_new_server.py &&
        echo 'Creating new web_routes.py...' &&
        python create_new_web_routes.py &&
        echo 'Starting server...' &&
        python server.py
      "
    networks:
      - astronomy-network

volumes:
  charts-data:

networks:
  astronomy-network:
    driver: bridge