<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Astronomy Observations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #0a0e27;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background-color: #1a1f3a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            max-width: 420px;
            width: 100%;
            padding: 2.5rem;
        }
        .login-card h2 {
            color: #4dabf7;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .login-card .subtitle {
            color: rgba(255,255,255,0.5);
            text-align: center;
            margin-bottom: 2rem;
        }
        .form-control {
            background-color: #252b4a;
            border-color: rgba(255,255,255,0.2);
            color: #e0e0e0;
        }
        .form-control:focus {
            background-color: #2d3561;
            border-color: #4dabf7;
            color: #e0e0e0;
            box-shadow: 0 0 0 0.25rem rgba(77, 171, 247, 0.25);
        }
        .btn-primary {
            background-color: #4dabf7;
            border-color: #4dabf7;
            width: 100%;
            padding: 0.6rem;
        }
        .btn-primary:hover {
            background-color: #339af0;
            border-color: #339af0;
        }
        .form-label { color: #b0b0b0; }
        a { color: #4dabf7; }
        a:hover { color: #74c0fc; }
        .alert { border: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2><i class="bi bi-person-plus"></i> Register</h2>
        <p class="subtitle">Create your account</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label for="username" class="form-label">Username <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="username" name="username" required autofocus>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="password" name="password" required>
                <div class="form-text" style="color:rgba(255,255,255,0.4);">Minimum 4 characters</div>
            </div>
            <div class="mb-3">
                <label for="password2" class="form-label">Confirm Password <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="password2" name="password2" required>
            </div>
            <button type="submit" class="btn btn-primary mb-3">
                <i class="bi bi-person-plus me-2"></i>Register
            </button>
        </form>
        <p class="text-center mb-0">
            <small>Already have an account? <a href="{{ url_for('web.login') }}">Log in</a></small>
        </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
